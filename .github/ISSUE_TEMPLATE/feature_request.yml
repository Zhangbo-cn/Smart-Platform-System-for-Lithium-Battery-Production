name: 功能建议
description: 建议新功能
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决什么痛点？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你期望的行为
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 引擎层
        - Agent 层
        - MCP 数据层
        - 编排层
        - 可观测性
        - 部署/CI
