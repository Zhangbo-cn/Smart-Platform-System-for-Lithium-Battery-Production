name: Bug 报告
description: 报告系统缺陷
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述问题现象
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现
      placeholder: |
        1. 调用 ...
        2. 传入参数 ...
        3. 看到错误 ...
    validations:
      required: true

  - type: input
    id: service
    attributes:
      label: 涉及服务
      description: 哪个服务出现的问题？
      placeholder: e.g. quality-rca-agent

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 如有错误日志，请粘贴
      render: shell
