# Playbook 剧本配置 — 替代 orchestrator/app.py 的硬编码 if-else
# 新增剧本只需加一条 YAML entry + 对应 Agent 的 AgentCard
#
# 格式说明：
#   nodes:     DAG 节点，支持 depends_on 表达依赖关系
#   parallel:  true 表示同层可并行执行
#   branches:  条件分支（满足 condition 时走 target 节点）
#   hitl_check: 节点返回中指定字段为真时暂停等人工
#   fallback:  失败/空结果时的兜底策略
#   depends_on: 前置依赖节点 ID（不填为起始节点）
playbooks:
  trace_only:
    description: 批次查询
    nodes:
      trace:
        agent: trace-worker
        required: true
        context_write:
          prior_evidence: "response.evidence"
          prior_tool_calls: "response.tool_calls"

  rca:
    description: 单点根因分析
    nodes:
      trace:
        agent: trace-worker
        condition: "batch_id"
        context_write:
          prior_evidence: "response.evidence"
          prior_tool_calls: "response.tool_calls"
      rca:
        agent: quality-rca-agent
        depends_on: [trace]
        required: true
        context_write:
          rca.thread_id: "response.thread_id"
          rca.root_cause: "response.root_cause"
          rca.confidence: "response.confidence"

  investigate:
    description: "深度分析：分诊→追溯→RCA（triage 与 trace 可并行）"
    nodes:
      triage:
        agent: triage-agent
        condition: "not skip_triage and not defect_type"
        parallel: true
        context_write:
          defect_type: "result.defect_type"
          severity: "result.severity"
      trace:
        agent: trace-worker
        condition: "batch_id"
        parallel: true
        context_write:
          prior_evidence: "response.evidence"
          prior_tool_calls: "response.tool_calls"
      confirm_rca:
        type: input_required
        depends_on: [triage, trace]
        condition: "not confirm_rca"
      rca:
        agent: quality-rca-agent
        depends_on: [triage, trace]
        required: true
        context_write:
          rca.thread_id: "response.thread_id"
          rca.root_cause: "response.root_cause"
          rca.confidence: "response.confidence"
        hitl_check:
          field: "response.requires_hitl"
          on_hitl: input_required

  close_loop:
    description: "质量闭环：RCA→8D→QMS（triage/trace 并行 → rca → report_8d）"
    nodes:
      triage:
        agent: triage-agent
        condition: "not skip_triage and not defect_type"
        parallel: true
      trace:
        agent: trace-worker
        condition: "batch_id"
        parallel: true
      rca:
        agent: quality-rca-agent
        depends_on: [triage, trace]
        required: true
        context_write:
          rca.thread_id: "response.thread_id"
          rca.root_cause: "response.root_cause"
          rca.confidence: "response.confidence"
        hitl_check:
          field: "response.requires_hitl"
          on_hitl: input_required
        fallback:
          on_empty: "root_cause"
          on_failure: true
      report_8d:
        agent: report-reporter-agent
        depends_on: [rca]
        required: true
        condition: "rca.root_cause"
        context_write:
          report_8d.report_md: "response.report_md"
          report_8d.capa_id: "response.capa_id"
          report_8d.qms_status: "response.qms_status"
