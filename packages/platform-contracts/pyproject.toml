[project]
name = "platform-contracts"
version = "0.1.0"
description = "Shared AgentCard, PlatformContext, TaskState for Battery Agent platform"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "pydantic>=2.9.0",
    "python-a2a>=0.5.10",
    "structlog>=24.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_contracts"]
